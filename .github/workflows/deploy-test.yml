name: Deploy to Testing

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy to Testing Server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            cd /www/wwwroot/distriboo.yoisar.com
            git checkout develop
            git pull origin develop

            # Reconstruir y levantar contenedores
            docker compose -f docker-compose.test.yml down
            docker compose -f docker-compose.test.yml up -d --build

            # Esperar a MySQL
            echo "Esperando a MySQL..."
            until docker exec distriboo_test_mysql mysqladmin ping -h localhost --silent 2>/dev/null; do
              sleep 2
            done

            # Ejecutar migraciones
            docker exec distriboo_test_backend php artisan migrate --force

            # Cargar datos de prueba
            docker exec distriboo_test_backend php artisan db:seed --class=TestDataSeeder --force

            echo "✅ Testing deploy completado"
          EOF

      - name: Deployment summary
        run: echo "✅ Testing deployed to https://test.distriboo.yoisar.com"
