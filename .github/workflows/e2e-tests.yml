name: E2E Tests

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: distriboo_test
          MYSQL_USER: distriboo_test_user
          MYSQL_PASSWORD: testing_password
          MYSQL_ROOT_PASSWORD: root_password
        ports:
          - 3308:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      mailhog:
        image: mailhog/mailhog
        ports:
          - 8025:8025
          - 1025:1025

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, mysql, dom, xml
          coverage: none

      - name: Install backend dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: Setup backend environment
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_PORT=.*/DB_PORT=3308/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=distriboo_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=distriboo_test_user/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=testing_password/' .env
          sed -i 's/MAIL_HOST=.*/MAIL_HOST=localhost/' .env
          sed -i 's/MAIL_PORT=.*/MAIL_PORT=1025/' .env

      - name: Run migrations and seed
        working-directory: backend
        run: php artisan migrate:fresh --seed

      - name: Start backend server
        working-directory: backend
        run: php artisan serve --port=8002 &

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8002/api
          NEXT_PUBLIC_APP_URL: http://localhost:3002
          NEXT_PUBLIC_APP_NAME: Distriboo-Test
        run: npm run build

      - name: Start frontend
        working-directory: frontend
        run: npm run start -- -p 3002 &

      - name: Wait for services
        run: |
          npx wait-on http://localhost:3002 http://localhost:8002 --timeout 60000

      - name: Run Playwright tests
        working-directory: frontend
        env:
          BASE_URL: http://localhost:3002
          API_URL: http://localhost:8002/api
          MAILHOG_URL: http://localhost:8025
          TEST_SUPER_ADMIN_EMAIL: sioy23@gmail.com
          TEST_SUPER_ADMIN_PASSWORD: '12345678'
          CI: true
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: frontend/test-results/
          retention-days: 7
