name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Backup production database
        run: |
          ssh -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            cd /www/wwwroot/distriboo.yoisar.com
            ./scripts/backup-production.sh
          EOF

      - name: Deploy to Production Server
        run: |
          ssh -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            cd /www/wwwroot/distriboo.yoisar.com
            git checkout main
            git pull origin main

            # Reconstruir y levantar contenedores
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d --build

            # Esperar a MySQL
            echo "Esperando a MySQL..."
            until docker exec distriboo_prod_mysql mysqladmin ping -h localhost --silent 2>/dev/null; do
              sleep 2
            done

            # Ejecutar migraciones (sin seed en producción)
            docker exec distriboo_prod_backend php artisan migrate --force

            echo "✅ Production deploy completado"
          EOF

      - name: Deployment summary
        run: echo "✅ Production deployed to https://distriboo.yoisar.com"
