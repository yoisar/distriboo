services:
  # ── Frontend (Next.js) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: https://api.distriboo.yoisar.com/api
    container_name: distriboo_prod_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.distriboo.yoisar.com/api
      - NEXT_PUBLIC_APP_URL=https://distriboo.yoisar.com
    networks:
      - distriboo_prod_network
    depends_on:
      - backend

  # ── Backend (Laravel) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: distriboo_prod_backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    env_file:
      - .env.production
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://api.distriboo.yoisar.com
      - APP_FRONTEND_URL=https://distriboo.yoisar.com
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=distriboo_prod
      - DB_USERNAME=distriboo_prod_user
      - DB_PASSWORD=${PROD_DB_PASSWORD}
      - SANCTUM_STATEFUL_DOMAINS=distriboo.yoisar.com
      - SESSION_DOMAIN=.yoisar.com
      - FRONTEND_URL=https://distriboo.yoisar.com
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - distriboo_prod_network

  # ── MySQL ──
  mysql:
    image: mysql:8.0
    container_name: distriboo_prod_mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:3307:3306"
    environment:
      MYSQL_DATABASE: distriboo_prod
      MYSQL_USER: distriboo_prod_user
      MYSQL_PASSWORD: ${PROD_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${PROD_ROOT_PASSWORD}
    volumes:
      - distriboo_prod_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - distriboo_prod_network

  # ── Nginx (proxy) ──
  nginx:
    image: nginx:alpine
    container_name: distriboo_prod_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8091:80"
    volumes:
      - ./infra/nginx/production.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - distriboo_prod_network

volumes:
  distriboo_prod_db_data:

networks:
  distriboo_prod_network:
    driver: bridge
