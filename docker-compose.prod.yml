services:
  # ── Frontend (Next.js) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: distriboo_frontend_prod
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://distriboo.yoisar.com/api
      - NODE_ENV=production
    networks:
      - distriboo_prod_network

  # ── Backend (Laravel) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: distriboo_backend_prod
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - ./backend/.env.production
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - distriboo_prod_network

  # ── MySQL ──
  mysql:
    image: mysql:8.0
    container_name: distriboo_mysql_prod
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: distriboo
      MYSQL_USER: distriboo_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - distriboo_prod_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - distriboo_prod_network

  # ── Nginx (proxy) ──
  nginx:
    image: nginx:alpine
    container_name: distriboo_nginx_prod
    restart: unless-stopped
    ports:
      - "8091:80"
    volumes:
      - ./infra/nginx/production.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - distriboo_prod_network

volumes:
  distriboo_prod_db_data:

networks:
  distriboo_prod_network:
    driver: bridge
