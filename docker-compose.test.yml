services:
  # ── Frontend (Next.js) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: distriboo_test_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://test.distriboo.yoisar.com/api
    networks:
      - distriboo_test_network
    depends_on:
      - backend

  # ── Backend (Laravel) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: distriboo_test_backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8002:8000"
    env_file:
      - .env.test
    environment:
      - APP_ENV=testing
      - APP_DEBUG=true
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=distriboo_test
      - DB_USERNAME=distriboo_test_user
      - DB_PASSWORD=${TEST_DB_PASSWORD}
    networks:
      - distriboo_test_network
    depends_on:
      mysql:
        condition: service_healthy

  # ── MySQL ──
  mysql:
    image: mysql:8.0
    container_name: distriboo_test_mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:3308:3306"
    environment:
      MYSQL_DATABASE: distriboo_test
      MYSQL_USER: distriboo_test_user
      MYSQL_PASSWORD: ${TEST_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${TEST_ROOT_PASSWORD}
    volumes:
      - distriboo_test_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - distriboo_test_network

  # ── Nginx (proxy) ──
  nginx:
    image: nginx:alpine
    container_name: distriboo_test_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8092:80"
    volumes:
      - ./infra/nginx/test.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - distriboo_test_network

volumes:
  distriboo_test_db_data:

networks:
  distriboo_test_network:
    driver: bridge
