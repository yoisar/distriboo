# /etc/nginx/conf.d/distriboo.conf
# Configuración Nginx para VPS - Distriboo (Multi-subdominio)
# Copiar a: /www/server/panel/vhost/nginx/ (BT Panel)
#
# Arquitectura de subdominios:
#   distriboo.yoisar.com          → Frontend Producción  (puerto 3001)
#   api.distriboo.yoisar.com      → API Producción       (puerto 8001)
#   test.distriboo.yoisar.com     → Frontend Testing     (puerto 3002)
#   test.api.distriboo.yoisar.com → API Testing          (puerto 8002)

# ============================================================
# PRODUCCIÓN - Frontend (distriboo.yoisar.com)
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name distriboo.yoisar.com;

    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name distriboo.yoisar.com;

    # SSL - BT Panel
    ssl_certificate /www/server/panel/vhost/cert/distriboo.yoisar.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/distriboo.yoisar.com/privkey.pem;

    access_log /var/log/nginx/distriboo_prod_access.log;
    error_log /var/log/nginx/distriboo_prod_error.log;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /storage {
        alias /www/wwwroot/distriboo.yoisar.com/backend/storage/app/public;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# ============================================================
# PRODUCCIÓN - API (api.distriboo.yoisar.com)
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name api.distriboo.yoisar.com;

    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.distriboo.yoisar.com;

    # SSL - BT Panel
    ssl_certificate /www/server/panel/vhost/cert/api.distriboo.yoisar.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/api.distriboo.yoisar.com/privkey.pem;

    access_log /var/log/nginx/distriboo_prod_api_access.log;
    error_log /var/log/nginx/distriboo_prod_api_error.log;

    # CORS - solo permite el frontend de producción
    add_header 'Access-Control-Allow-Origin' 'https://distriboo.yoisar.com' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With, Accept' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;

    # Preflight
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' 'https://distriboo.yoisar.com';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With, Accept';
        add_header 'Access-Control-Allow-Credentials' 'true';
        add_header 'Content-Length' 0;
        return 204;
    }

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $scheme://$host;
        proxy_set_header Referer $scheme://$host;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

