# /etc/nginx/conf.d/distriboo.conf
# Configuración Nginx para VPS - Distriboo
# Copiar a: /www/server/panel/vhost/nginx/ (BT Panel)

# === TESTING ENVIRONMENT ===
server {
    listen 80;
    listen [::]:80;
    server_name test.distriboo.yoisar.com;

    access_log /var/log/nginx/distriboo_test_access.log;
    error_log /var/log/nginx/distriboo_test_error.log;

    # Frontend Testing
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API Testing
    location /api {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Sanctum CSRF Testing
    location /sanctum {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# === PRODUCTION ENVIRONMENT ===
server {
    listen 80;
    listen [::]:80;
    server_name distriboo.yoisar.com;

    # Redirigir HTTP a HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name distriboo.yoisar.com;

    # SSL - Ajustar rutas según BT Panel
    ssl_certificate /www/server/panel/vhost/cert/distriboo.yoisar.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/distriboo.yoisar.com/privkey.pem;

    access_log /var/log/nginx/distriboo_prod_access.log;
    error_log /var/log/nginx/distriboo_prod_error.log;

    # Frontend Producción
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API Producción
    location /api {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Sanctum CSRF Producción
    location /sanctum {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Archivos estáticos
    location /storage {
        alias /www/wwwroot/distriboo.yoisar.com/backend/storage/app/public;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
