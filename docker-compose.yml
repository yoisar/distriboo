services:
  # ── Frontend (Next.js) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: distriboo_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - WATCHPACK_POLLING=true
    depends_on:
      - backend
    networks:
      - distriboo_network

  # ── Backend (Laravel) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: distriboo_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www
      - /var/www/vendor
    environment:
      - APP_NAME=Distriboo
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=distriboo
      - DB_USERNAME=distriboo_user
      - DB_PASSWORD=distriboo_secret_2026
      - SANCTUM_STATEFUL_DOMAINS=localhost:3000
      - SESSION_DOMAIN=localhost
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - distriboo_network

  # ── MySQL ──
  mysql:
    image: mysql:8.0
    container_name: distriboo_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: distriboo
      MYSQL_USER: distriboo_user
      MYSQL_PASSWORD: distriboo_secret_2026
      MYSQL_ROOT_PASSWORD: distriboo_root_2026
    ports:
      - "3306:3306"
    volumes:
      - distriboo_db_data:/var/lib/mysql
      - ./infra/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pdistriboo_root_2026"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - distriboo_network

  # ── Nginx (proxy) ──
  nginx:
    image: nginx:alpine
    container_name: distriboo_nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - distriboo_network

  # ── phpMyAdmin (opcional, desarrollo) ──
  phpmyadmin:
    image: phpmyadmin:5
    container_name: distriboo_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: distriboo_user
      PMA_PASSWORD: distriboo_secret_2026
    depends_on:
      - mysql
    networks:
      - distriboo_network

volumes:
  distriboo_db_data:

networks:
  distriboo_network:
    driver: bridge
